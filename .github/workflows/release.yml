name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.0). Created if it does not exist."
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  # Fail fast on one cheap runner before starting four platform builds.
  release-smoke:
    runs-on: ubuntu-22.04
    steps:
      - name: Smoke test
        uses: ./.github/actions/release-smoke

  release:
    needs: release-smoke
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Listed for readability; all jobs start in parallel after smoke passes.
          - platform: windows-2022
            args: ""
          - platform: macos-14 # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-14 # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Build and release (${{ matrix.platform }})
        uses: ./.github/actions/build-release
        with:
          platform: ${{ matrix.platform }}
          args: ${{ matrix.args }}
