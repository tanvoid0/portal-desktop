name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.0). Created if it does not exist."
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-14 # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-2022
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      # pnpm must be installed before setup-node so its packageManager-based
      # cache detection can find pnpm on PATH.
      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "portal-desktop v__VERSION__"
          releaseBody: |
            ## Portal Desktop v__VERSION__

            ### Required: Agent Platform

            All AI features require [**agent-platform**](https://github.com/tanvoid0/agent-platform/) running separately.

            1. Clone and start: `git clone https://github.com/tanvoid0/agent-platform.git && cd agent-platform && pnpm install && pnpm dev:server`
            2. Configure providers at `http://127.0.0.1:18410/config`
            3. In Portal Desktop: **AI → Providers** → set base URL and workspace token

            Setup guide: [docs/getting-started/AGENT_PLATFORM.md](https://github.com/tanvoid0/portal-desktop/blob/main/docs/getting-started/AGENT_PLATFORM.md)

            ### Downloads

            Install the asset for your platform below. Existing installs auto-update via the built-in updater.

            ### Changelog

            See [RELEASE_NOTES.md](https://github.com/tanvoid0/portal-desktop/blob/main/docs/status/RELEASE_NOTES.md)
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}
