name: Build and release portal-desktop
description: Shared Tauri release build and GitHub Release upload steps
inputs:
  platform:
    description: Runner platform label (ubuntu-22.04, windows-2022, macos-14)
    required: true
  args:
    description: Extra args passed to tauri build
    required: false
    default: ""
runs:
  using: composite
  steps:
    # pnpm must be installed before setup-node so its packageManager-based
    # cache detection can find pnpm on PATH.
    - name: Install pnpm
      uses: pnpm/action-setup@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: "22"

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.platform == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: "./src-tauri -> target"

    - name: Install Linux system dependencies
      if: inputs.platform == 'ubuntu-22.04'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          build-essential \
          curl wget file \
          libssl-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          patchelf

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Build and release
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ github.token }}
        TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      with:
        tagName: ${{ github.event.inputs.tag || github.ref_name }}
        releaseName: "portal-desktop v__VERSION__"
        releaseBody: |
          ## Portal Desktop v__VERSION__

          ### Required: Agent Platform

          All AI features require [**agent-platform**](https://github.com/tanvoid0/agent-platform/) running separately.

          1. Clone and start: `git clone https://github.com/tanvoid0/agent-platform.git && cd agent-platform && pnpm install && pnpm dev:server`
          2. Configure providers at `http://127.0.0.1:18410/config`
          3. In Portal Desktop: **AI → Providers** → set base URL and workspace token

          Setup guide: [docs/getting-started/AGENT_PLATFORM.md](https://github.com/tanvoid0/portal-desktop/blob/main/docs/getting-started/AGENT_PLATFORM.md)

          ### Downloads

          Install the asset for your platform below. Existing installs auto-update via the built-in updater.

          ### Changelog

          See [RELEASE_NOTES.md](https://github.com/tanvoid0/portal-desktop/blob/main/docs/status/RELEASE_NOTES.md)
        releaseDraft: false
        prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
        # Requires bundle.createUpdaterArtifacts in tauri.conf.json so .sig files
        # are generated and latest.json can be assembled across release jobs.
        uploadUpdaterJson: true
        uploadUpdaterSignatures: true
        updaterJsonPreferNsis: true
        args: ${{ inputs.args }}
